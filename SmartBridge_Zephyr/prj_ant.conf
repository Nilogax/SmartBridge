# ANT enabled
CONFIG_ANT=y
CONFIG_ANT_EVALUATION_KEY=y
CONFIG_SMARTBRIDGE_ANT=y
CONFIG_ANT_BPWR=y
CONFIG_ANT_KEY_MANAGER=y
CONFIG_ANT_CHANNEL_CONFIG=y

# ====================== USB Serial ======================
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_CONSOLE=y

# ====================== Bootloader ======================
# DISABLE MCUBOOT - much simpler for now
# CONFIG_BOOTLOADER_MCUBOOT=n

# ====================== Bluetooth ======================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_DEVICE_NAME="SmartBridge"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y

# ====================== Services ======================
CONFIG_BT_DIS=y
CONFIG_BT_DIS_MANUF="Nilogax"
CONFIG_BT_DIS_MODEL="SmartBridge"
CONFIG_BT_DIS_FW_REV=y
CONFIG_BT_DIS_FW_REV_STR="0.9.2"
CONFIG_BT_BAS=y

# ====================== Peripherals ======================
CONFIG_ADC=y
CONFIG_I2C=y
CONFIG_GPIO=y

# ====================== Logging ======================
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# ====================== Memory ======================
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

CONFIG_LSM6DSL=n
CONFIG_LSM6DSO=n
CONFIG_LSM6DS0=n